<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Kalkulator półek</title>

  <style>

    body{
      font-family: Arial;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .box{
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      margin-bottom: 10px;
    }

    .info{
      background: #f1f1f1;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.5;
    }

    input{
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 20px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button{
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover{
      opacity: 0.9;
    }

    #wyniki{
      margin-top: 25px;
      font-size: 18px;
      line-height: 1.8;
    }

    .uwaga{
      margin-top: 20px;
      background: #fff3cd;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

  </style>
</head>

<body>

<div class="box">

  <h1>Kalkulator półek</h1>

  <div class="info">
    Kalkulator działa dla wieńca wpuszczonego
    (znajdującego się pomiędzy bokami korpusu).
  </div>

  <label>Wysokość korpusu (X)</label>
  <input type="number" id="x">

  <label>Ilość półek (A)</label>
  <input type="number" id="a">

  <button onclick="oblicz()">OBLICZ</button>

  <div id="wyniki"></div>

</div>

<script>

function oblicz(){

  let X = parseFloat(document.getElementById("x").value);
  let A = parseInt(document.getElementById("a").value);

  let Z = X - 36;
  let Y = Z - (18 * A);
  let B = Y / (A + 1);

  let tekst = `<h2>Wyniki:</h2>`;

  tekst += `
  <div class="uwaga">
    Wszystkie wartości mierzone są wewnątrz korpusu.<br><br>

    Jeśli rozpisujesz szafkę przed skręceniem,
    do każdego wyniku należy dodać 18 mm.
  </div>
  `;

  tekst += `<br>B = ${B.toFixed(2)} mm<br><br>`;

  for(let n = 1; n <= A; n++){

    let wynik = (n * B) + (18 * n) - 20.5;

    tekst += `A${n} = ${wynik.toFixed(2)} mm<br>`;
  }

  document.getElementById("wyniki").innerHTML = tekst;
}

</script>

</body>
</html>
